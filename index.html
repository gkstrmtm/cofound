<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Anna Cofound App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="prototype-layout">
      <section class="app-frame" aria-label="anna cofound mobile app">
        <header class="topbar">
          <button class="icon-button" id="menuButton" aria-label="menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </header>

        <aside class="menu-drawer" id="menuDrawer" aria-hidden="true">
          <button class="menu-scrim" id="menuScrim" aria-label="close menu"></button>
          <div class="menu-panel" role="dialog" aria-label="menu">
            <button class="menu-close" id="menuClose" aria-label="close">×</button>
            <nav class="menu-list" aria-label="menu items">
              <button type="button" class="menu-item" id="startupNameButton">name your startup</button>
              <button type="button" class="menu-item" id="settingsButton">settings</button>
            </nav>
          </div>
        </aside>

        <section class="chat-stage" aria-live="polite">
          <div class="logo-stage" id="logoStage">
            <div class="anna-logo anna-logo-large pulse" aria-hidden="true">
              <img
                class="logo-image"
                src="brand/1.png"
                alt="anna cofound logo"
                decoding="async"
                fetchpriority="high"
              />
              <span class="logo-triangle"></span>
              <span class="logo-orb"></span>
            </div>
          </div>

          <div class="prompt-seed" id="promptSeed">
            <span>try:</span>
            <strong>“hey anna, let’s build our first startup”</strong>
          </div>

          <div class="transcript-pane hidden" id="transcriptPane" aria-label="transcript">
            <div class="transcript-list" id="transcriptList"></div>
          </div>
        </section>

        <button class="record-orb" id="recordButton" aria-label="talk">
          <div class="anna-logo anna-logo-small" aria-hidden="true">
            <img class="logo-image" src="brand/1.png" alt="" decoding="async" />
            <span class="logo-triangle"></span>
            <span class="logo-orb"></span>
          </div>
        </button>

        <section class="modal" id="startupNameModal" aria-hidden="true">
          <button class="modal-scrim" type="button" data-modal-close aria-label="close"></button>
          <div class="modal-panel" role="dialog" aria-label="startup name">
            <div class="modal-header">
              <div class="anna-logo anna-logo-modal" aria-hidden="true">
                <img class="logo-image" src="brand/1.png" alt="" decoding="async" />
                <span class="logo-triangle"></span>
                <span class="logo-orb"></span>
              </div>
              <div>
                <h2>startup name</h2>
                <p>what should anna call it?</p>
              </div>
            </div>

            <label class="field">
              <span class="field-label">name</span>
              <input id="startupNameInput" type="text" inputmode="text" autocomplete="organization" />
            </label>

            <div class="modal-actions">
              <button type="button" class="glass-button" data-modal-close>cancel</button>
              <button type="button" class="glass-button primary" id="startupNameSave">save</button>
            </div>
          </div>
        </section>

        <section class="modal" id="settingsModal" aria-hidden="true">
          <button class="modal-scrim" type="button" data-modal-close aria-label="close"></button>
          <div class="modal-panel" role="dialog" aria-label="settings">
            <div class="modal-header">
              <h2>settings</h2>
              <p>quick controls for this prototype</p>
            </div>

            <div class="settings-list" role="list">
              <div class="settings-row" role="listitem">
                <div>
                  <div class="settings-title">startup</div>
                  <div class="settings-subtitle" id="settingsStartupName">not set</div>
                </div>
                <button type="button" class="glass-button" id="settingsRename">rename</button>
              </div>

              <div class="settings-row" role="listitem">
                <div>
                  <div class="settings-title">transcript</div>
                  <div class="settings-subtitle">clears on-device only</div>
                </div>
                <button type="button" class="glass-button" id="clearTranscript">clear</button>
              </div>

              <div class="settings-row" role="listitem">
                <div>
                  <div class="settings-title">conversation</div>
                  <div class="settings-subtitle">resets what anna sees next</div>
                </div>
                <button type="button" class="glass-button" id="clearConversation">reset</button>
              </div>
            </div>

            <div class="modal-actions">
              <button type="button" class="glass-button primary" data-modal-close>done</button>
            </div>
          </div>
        </section>

        <section class="modal" id="textInputModal" aria-hidden="true">
          <button class="modal-scrim" type="button" data-modal-close aria-label="close"></button>
          <div class="modal-panel" role="dialog" aria-label="type to anna">
            <div class="modal-header">
              <h2>type to anna</h2>
              <p>your browser doesn't support speech here</p>
            </div>

            <label class="field">
              <span class="field-label">message</span>
              <input id="textInputField" type="text" inputmode="text" autocomplete="off" />
            </label>

            <div class="modal-actions">
              <button type="button" class="glass-button" data-modal-close>cancel</button>
              <button type="button" class="glass-button primary" id="textInputSend">send</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
